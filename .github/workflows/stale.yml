name: Stale

# Close stale issues and PRs after 30 days of inactivity.
# Dependabot PRs are exempt.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark/close stale items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run stale
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            Please comment to keep it open.
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: "Closed: no activity for 30+ days."
          close-pr-message: "Closed: no activity for 30+ days."
          exempt-issue-labels: "pinned,security,enhancement"
          exempt-pr-labels: "pinned,security,dependabot-merge-ignore"
          operations-per-run: 50
