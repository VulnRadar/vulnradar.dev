name: Auto-merge Dependabot PRs

# Auto-merge patch and minor dependabot updates after CI passes.
# Major updates (e.g. next major bump) are NOT auto-merged.
# Override with the `dependabot-merge-ignore` label.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-merge:
    name: Auto-merge patch/minor updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch/minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          !contains(github.event.pull_request.labels.*.name, 'dependabot-merge-ignore')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
