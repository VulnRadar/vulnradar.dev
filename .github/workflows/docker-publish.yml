name: Build, Sign, and Publish Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing (OIDC token exchange).
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        # release: pin the cosign binary by digest. v2.4.1 is the
        # current Sigstore cosign; pinning by digest makes the install
        # reproducible and tamper-evident.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Extract version from tag
        id: vars
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          IMAGE=ghcr.io/${OWNER_LC}/vulnradar

          docker build \
            -t $IMAGE:${VERSION} \
            -t $IMAGE:latest .

          docker push $IMAGE:${VERSION}
          docker push $IMAGE:latest

      - name: Sign image with cosign (keyless)
        # release: keyless signing via Sigstore Fulcio + Rekor. No
        # long-lived private key to manage. The signature is published
        # alongside the image tag; consumers verify with
        # `cosign verify --certificate-identity ... ghcr.io/...:${VERSION}`.
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/vulnradar
          VERSION: ${{ github.ref_name }}
        run: |
          cosign sign --yes \
            "${IMAGE}:${VERSION}"

      - name: Sign :latest with cosign
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/vulnradar
        run: cosign sign --yes "${IMAGE}:latest"

      - name: Generate SBOM (CycloneDX, JSON)
        # release: CycloneDX SBOM is the most widely consumed format.
        # `anchore/sbom-action` runs syft on the built image and writes
        # the SBOM next to the build artifacts.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/vulnradar:${{ github.ref_name }}
          format: cyclonedx-json
          artifact-name: vulnradar-${{ github.ref_name }}.sbom.cdx.json

      - name: Upload release artifacts
        # release: collect the SBOM into a single directory that the
        # release.yml workflow will pick up via `actions/upload-artifact`.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts
          path: |
            ${{ github.workspace }}/vulnradar-*.sbom.cdx.json
          if-no-files-found: warn
