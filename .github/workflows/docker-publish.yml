name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/vulnradar:${{ env.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/vulnradar:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/vulnradar:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/vulnradar:latest