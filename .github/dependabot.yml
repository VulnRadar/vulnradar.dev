version: 2
updates:
  # npm dependencies (Next.js, React, TypeScript, shadcn, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependabot"
      - "dependencies"
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "eslint-config-next"
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"
      ui:
        patterns:
          - "@radix-ui/*"
          - "lucide-react"
          - "react-icons"
          - "tailwindcss"
          - "tailwindcss-animate"
          - "tailwind-merge"
          - "class-variance-authority"
          - "clsx"
      scanning:
        patterns:
          - "dompurify"
          - "jspdf"
          - "jspdf-autotable"
          - "recharts"
          - "cmdk"
          - "embla-carousel-react"
          - "vaul"
          - "sonner"
          - "swr"
          - "react-day-picker"
          - "react-hook-form"
          - "react-resizable-panels"
          - "input-otp"
          - "date-fns"
          - "server-only"
      security:
        patterns:
          - "bcrypt"
          - "bcryptjs"
          - "jsonwebtoken"
          - "nodemailer"
          - "@neondatabase/serverless"
          - "pg"
          - "zod"
          - "@hookform/resolvers"
      build:
        patterns:
          - "postcss"
          - "autoprefixer"
          - "typescript"
          - "@types/*"
          - "tslib"
    ignore:
      # Only get major Next.js updates as PRs you manually review
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions themselves
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    labels:
      - "dependabot"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
