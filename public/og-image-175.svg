<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#60a5fa" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Logo icon -->
  <g transform="translate(100, 180)">
    <circle cx="60" cy="60" r="55" fill="#0f172a" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <circle cx="60" cy="60" r="25" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="60" r="10" fill="#60a5fa"/>
    <line x1="68" y1="52" x2="100" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="35" r="5" fill="#fbbf24"/>
    <circle cx="60" cy="100" r="5" fill="#fbbf24"/>
  </g>
  
  <!-- Brand name -->
  <text x="240" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">VulnRadar</text>
  
  <!-- Tagline -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">Web Vulnerability Scanner</text>
  
  <!-- Feature badges -->
  <g transform="translate(100, 400)">
    <!-- 175+ Checks badge -->
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#3b82f6" opacity="0.2"/>
    <rect x="0" y="0" width="200" height="50" rx="25" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#60a5fa" text-anchor="middle">175+ Checks</text>
    
    <!-- Free tier badge -->
    <rect x="220" y="0" width="160" height="50" rx="25" fill="#10b981" opacity="0.2"/>
    <rect x="220" y="0" width="160" height="50" rx="25" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="300" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#34d399" text-anchor="middle">Free Tier</text>
    
    <!-- Open Source badge -->
    <rect x="400" y="0" width="180" height="50" rx="25" fill="#8b5cf6" opacity="0.2"/>
    <rect x="400" y="0" width="180" height="50" rx="25" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="490" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#a78bfa" text-anchor="middle">Open Source</text>
  </g>
  
  <!-- URL -->
  <text x="100" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">vulnradar.dev</text>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="150" r="100" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="500" r="150" fill="#60a5fa" opacity="0.05"/>
  
  <!-- Scan visualization -->
  <g transform="translate(850, 200)" opacity="0.8">
    <circle cx="100" cy="100" r="80" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10 5"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 4"/>
    <circle cx="100" cy="100" r="40" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="6 3"/>
    <circle cx="100" cy="100" r="8" fill="#60a5fa"/>
    <line x1="108" y1="92" x2="160" y2="40" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
