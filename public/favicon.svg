<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="512" cy="512" r="512" fill="#E8F0FE"/>
  
  <!-- Outer blue ring -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#5B9BFF" stroke-width="72"/>
  
  <!-- Dark navy outer ring -->
  <circle cx="512" cy="512" r="380" fill="#0F1419" stroke="none"/>
  
  <!-- Mid blue ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#5B9BFF" stroke-width="60"/>
  
  <!-- Dark navy mid ring -->
  <circle cx="512" cy="512" r="290" fill="#0F1419" stroke="none"/>
  
  <!-- Inner blue ring -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="#5B9BFF" stroke-width="60"/>
  
  <!-- Center circle -->
  <circle cx="512" cy="512" r="190" fill="#0F1419" stroke="none"/>
  
  <!-- Inner blue circle -->
  <circle cx="512" cy="512" r="150" fill="#5B9BFF" stroke="none"/>
  
  <!-- White diagonal line (scanner sweep) -->
  <line x1="300" y1="300" x2="724" y2="724" stroke="white" stroke-width="48" stroke-linecap="round"/>
  
  <!-- Top left yellow accent dot -->
  <circle cx="340" cy="300" r="36" fill="#FFC107"/>
  
  <!-- Bottom right yellow accent dot -->
  <circle cx="684" cy="724" r="36" fill="#FFC107"/>
</svg>
